services:
  wb-meshtastic-control:
    build:
      context: .
      dockerfile: Dockerfile
    image: wb-meshtastic-control:latest
    container_name: wb-meshtastic-control
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8091
      WB_MQTT_HOST: ${WB_MQTT_HOST:-mosquitto}
      WB_MQTT_PORT: ${WB_MQTT_PORT:-1883}
      MESHTASTIC_PORT: ${MESHTASTIC_PORT:-/dev/ttyACM0}
      RULES_PATH: ${RULES_PATH:-./config/rules.yaml}
      CONTROLS_PATH: ${CONTROLS_PATH:-./config/controls.yaml}
    ports:
      - "8091:8091"
    devices:
      - "${MESHTASTIC_DEVICE:-/dev/ttyACM0}:${MESHTASTIC_DEVICE:-/dev/ttyACM0}"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - /dev/serial:/dev/serial
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: wb-meshtastic-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  mosquitto-data:
  mosquitto-log:
