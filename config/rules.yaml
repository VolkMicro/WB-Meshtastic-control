rules:
  - id: boiler-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: boiler_on
    actions:
      - type: wb_control_switch
        control_id: boiler
        state: on

  - id: boiler-off
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: boiler_off
    actions:
      - type: wb_control_switch
        control_id: boiler
        state: off

  - id: light-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: light_on
    actions:
      - type: wb_control_switch
        control_id: light
        state: on

  - id: light-off
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: light_off
    actions:
      - type: wb_control_switch
        control_id: light
        state: off

  - id: guard-mode-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: guard_mode_on
    actions:
      - type: wb_control_switch
        control_id: boiler
        state: off
      - type: wb_control_switch
        control_id: light
        state: off

  - id: private-status-reply
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: status_request
    actions:
      - type: mesh_status_reply
        dest: "{{source}}"

  # Legacy/test aliases remain enabled for compatibility with prior tests.
  - id: legacy-k1-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: k1_on
    actions:
      - type: wb_control_switch
        control_id: boiler
        state: on

  - id: legacy-k1-off
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: k1_off
    actions:
      - type: wb_control_switch
        control_id: boiler
        state: off

  - id: legacy-stop-pump
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: stop_pump
    actions:
      - type: wb_control_switch
        control_id: boiler
        state: on
