rules:
  - id: k1-on
    enabled: true
    match:
      kind: event
      event: k1_on
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "1"

  - id: k1-off
    enabled: true
    match:
      kind: event
      event: k1_off
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "0"

  - id: ack-command
    enabled: true
    match:
      kind: event
    actions:
      - type: mesh_text
        dest: "^all"
        text: "Command received: {{ event }}"
