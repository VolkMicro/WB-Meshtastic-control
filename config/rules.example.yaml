rules:
  - id: boiler-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: boiler_on
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "1"

  - id: boiler-off
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: boiler_off
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "0"

  - id: light-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: light_on
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K2/on
        payload: "1"

  - id: light-off
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: light_off
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K2/on
        payload: "0"

  - id: guard-mode-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: guard_mode_on
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "0"
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K2/on
        payload: "0"

  - id: private-status-reply
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: status_request
    actions:
      - type: mesh_status_reply
        dest: "{{source}}"

  # Legacy/test aliases remain enabled for compatibility with prior tests.
  - id: legacy-k1-on
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: k1_on
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "1"

  - id: legacy-k1-off
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: k1_off
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "0"

  - id: legacy-stop-pump
    enabled: true
    match:
      kind: event
      source: "!6985212c"
      event: stop_pump
    actions:
      - type: wb_mqtt_relay
        topic: /devices/wb-mr6cv3_92/controls/K1/on
        payload: "1"
